services:
  - type: web
    name: rdv-medical
    runtime: java
    buildCommand: mvn clean package
    startCommand: java -jar target/rdv-medical.war
    envVars:
      - key: DB_URL
        fromDatabase:
          name: rdv-medical-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: rdv-medical-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: rdv-medical-db
          property: password

databases:
  - name: rdv-medical-db
    databaseName: rdv_medecin
    user: rdv_user